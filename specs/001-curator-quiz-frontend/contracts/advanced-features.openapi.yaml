openapi: 3.1.0
info:
  title: Duck Emporium Advanced Features API
  version: 0.1.0
  description: >-
    Contracts for stories 06-09: curator add duck, Duck of the Day, personality
    quiz, and static web frontend entrypoint.
servers:
  - url: http://localhost:3000
paths:
  /:
    get:
      summary: Serve web frontend shell
      operationId: getFrontendShell
      responses:
        '200':
          description: HTML frontend shell
          content:
            text/html:
              schema:
                type: string
  /admin/ducks:
    post:
      summary: Add a new duck to catalog (curator only)
      operationId: addDuck
      parameters:
        - name: x-admin-password
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddDuckRequest'
      responses:
        '201':
          description: Duck created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddDuckSuccess'
        '400':
          description: Validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing/invalid admin password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Duplicate duck name
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /ducks/featured:
    get:
      summary: Get deterministic Duck of the Day
      operationId: getDuckOfTheDay
      responses:
        '200':
          description: Featured duck or friendly fallback
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/FeaturedDuckSuccess'
                  - $ref: '#/components/schemas/FeaturedDuckFallback'
  /quiz/result:
    post:
      summary: Submit quiz answers and get deterministic recommendation
      operationId: getQuizResult
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuizSubmission'
      responses:
        '200':
          description: Deterministic quiz result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuizResult'
        '400':
          description: Invalid or incomplete answers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    AddDuckRequest:
      type: object
      required:
        - name
        - category
        - price
        - tagline
        - description
        - personalityTraits
        - initialStock
      properties:
        name:
          type: string
          minLength: 1
        category:
          type: string
          minLength: 1
        price:
          type: number
          minimum: 0
        tagline:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        personalityTraits:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 1
        initialStock:
          type: integer
          minimum: 0
    AddDuckSuccess:
      type: object
      required:
        - duck
      properties:
        duck:
          $ref: '#/components/schemas/Duck'
    Duck:
      type: object
      required:
        - id
        - name
        - category
        - price
        - tagline
        - description
        - personalityTraits
        - stock
      properties:
        id:
          type: string
        name:
          type: string
        category:
          type: string
        price:
          type: number
        tagline:
          type: string
        description:
          type: string
        personalityTraits:
          type: array
          items:
            type: string
        stock:
          type: integer
          minimum: 0
    DuckSummary:
      type: object
      required:
        - id
        - name
        - category
        - price
        - tagline
      properties:
        id:
          type: string
        name:
          type: string
        category:
          type: string
        price:
          type: number
        tagline:
          type: string
    FeaturedDuckSuccess:
      type: object
      required:
        - date
        - duck
      properties:
        date:
          type: string
          format: date
        duck:
          $ref: '#/components/schemas/DuckSummary'
    FeaturedDuckFallback:
      type: object
      required:
        - date
        - message
      properties:
        date:
          type: string
          format: date
        message:
          type: string
          example: The pond is empty today, come back tomorrow.
    QuizSubmission:
      type: object
      required:
        - answers
      properties:
        answers:
          type: object
          required:
            - q1
            - q2
            - q3
            - q4
            - q5
          properties:
            q1:
              type: string
              enum: [A, B, C, D, E]
            q2:
              type: string
              enum: [A, B, C, D, E]
            q3:
              type: string
              enum: [A, B, C, D, E]
            q4:
              type: string
              enum: [A, B, C, D, E]
            q5:
              type: string
              enum: [A, B, C, D, E]
    QuizResult:
      type: object
      required:
        - winningCategory
        - scores
        - message
        - duckDetailUrl
      properties:
        winningCategory:
          type: string
          enum: [Adventurer, Comedian, Philosopher, Romantic, Zen Master]
        scores:
          type: object
          additionalProperties:
            type: integer
        message:
          type: string
        duckDetailUrl:
          type: string
          nullable: true
        recommendedDuck:
          allOf:
            - $ref: '#/components/schemas/DuckSummary'
          nullable: true
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
